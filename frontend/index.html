    <style>
      /* Aggressively hide Google Translate top bar */
      body {
        top: 0 !important;
        position: static !important;
      }
      
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      iframe.goog-te-banner-frame,
      iframe.skiptranslate[style*="box-shadow"],
      .skiptranslate iframe,
      #goog-gt-tt,
      .goog-te-balloon-frame {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        min-height: 0 !important;
        max-height: 0 !important;
        position: absolute !important;
        top: -9999px !important;
        left: -9999px !important;
        z-index: -9999 !important;
      }
      
      /* Ensure body doesn't get pushed down */
      html body {
        position: static !important;
        top: 0 !important;
        margin-top: 0 !important;
        padding-top: 0 !important;
      }
      
      /* Hide the translate notification bar */
      .goog-te-banner-frame.skiptranslate {

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Aggressively remove Google Translate top bar
      (function() {
        var hideGoogleBar = function() {
          // Hide all iframes related to Google Translate
          var iframes = document.querySelectorAll('iframe.skiptranslate, iframe.goog-te-banner-frame, .goog-te-banner-frame');
          iframes.forEach(function(iframe) {
            iframe.style.display = 'none';
            iframe.style.visibility = 'hidden';
            iframe.style.opacity = '0';
            iframe.style.height = '0';
            iframe.style.position = 'absolute';
            iframe.style.top = '-9999px';
          });
          
          // Reset body position
          document.body.style.top = '0';
          document.body.style.position = 'static';
          
          // Remove the translate bar div if it exists
          var banner = document.querySelector('.goog-te-banner-frame');
          if (banner && banner.parentNode) {
            banner.parentNode.removeChild(banner);
          }
        };
        
        // Run immediately
        hideGoogleBar();
        
        // Run on DOM ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', hideGoogleBar);
        }
        
        // Run on window load
        window.addEventListener('load', hideGoogleBar);
        
        // Run periodically to catch dynamically added elements
        setInterval(hideGoogleBar, 100);
        
        // Observe DOM changes
        var observer = new MutationObserver(hideGoogleBar);
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true
        });
      })();
    </script>
  </body>
